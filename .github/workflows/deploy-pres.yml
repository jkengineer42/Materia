name: Deploy Presentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pres/**'
      - '.github/workflows/deploy-pres.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy pres/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pres
          destination_dir: .
